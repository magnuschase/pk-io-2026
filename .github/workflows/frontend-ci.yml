name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "smartrecipe/frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: smartrecipe/frontend

jobs:
  quality:
    name: 🧹 FE Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: 📚 Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.23.0

      - name: 📚 Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: smartrecipe/frontend/pnpm-lock.yaml

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧹 Lint
        run: pnpm lint

      - name: ⚙️ Test (with coverage thresholds)
        run: pnpm test:cov
