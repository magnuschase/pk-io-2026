name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'smartrecipe/backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: smartrecipe/backend

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: smartrecipe/backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm exec eslint "{src,apps,libs,test}/**/*.ts"

      - name: Prettier
        run: pnpm exec prettier --check "src/**/*.ts" "test/**/*.ts"

      - name: Unit tests
        run: pnpm test
