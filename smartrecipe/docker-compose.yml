services:
  postgres:
    image: postgres:16-alpine
    container_name: smartrecipe_db
    environment:
      POSTGRES_USER: ${DB_USER:-smartrecipe}
      POSTGRES_PASSWORD: ${DB_PASS:-smartrecipe}
      POSTGRES_DB: ${DB_NAME:-smartrecipe}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartrecipe}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
