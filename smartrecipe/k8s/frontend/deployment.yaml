apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartrecipe-frontend
  labels:
    app.kubernetes.io/name: smartrecipe-frontend
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smartrecipe-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartrecipe-frontend
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: frontend
          image: smartrecipe-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
