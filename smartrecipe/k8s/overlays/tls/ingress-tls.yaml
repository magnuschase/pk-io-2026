apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartrecipe
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - smartrecipe.example.com
        - api.smartrecipe.example.com
      secretName: smartrecipe-tls
  rules:
    - host: smartrecipe.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smartrecipe-frontend
                port:
                  number: 80
    - host: api.smartrecipe.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smartrecipe-backend
                port:
                  number: 3000
